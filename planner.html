<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner · KENTECH Study Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="index.html">📚 Study Hub</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="planner.html" class="active">Planner</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
    <button class="nav-hamburger" id="hamburger">☰</button>
  </nav>

  <main class="page-main">
    <div class="page-header">
      <h1>Study Planner</h1>
      <p>Add your tasks, check them off, stay on top of everything.</p>
    </div>

    <!-- ADD TASK FORM -->
    <div class="task-form-card">
      <h2 class="form-title">Add New Task</h2>
      <div class="task-form">
        <input type="text" id="taskTitle" placeholder="Task title  e.g. Study Chapter 3" class="input-field" />
        <select id="taskSubject" class="input-field select-field">
          <option value="">Subject</option>
          <option value="Mathematics">Mathematics</option>
          <option value="Physics">Physics</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Biology">Biology</option>
          <option value="Computer Science">Computer Science</option>
          <option value="Engineering">Engineering</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="taskDue" class="input-field" />
        <select id="taskPriority" class="input-field select-field">
          <option value="medium">Medium Priority</option>
          <option value="high">High Priority</option>
          <option value="low">Low Priority</option>
        </select>
        <button class="btn btn-primary" id="addTaskBtn">Add Task</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <div class="filter-spacer"></div>
      <select id="filterSubject" class="input-field select-field select-sm">
        <option value="">All Subjects</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Biology">Biology</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Engineering">Engineering</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- MINI PROGRESS -->
    <div class="mini-progress-bar">
      <span id="progressLabel">0 / 0 completed</span>
      <div class="progress-track">
        <div class="progress-fill" id="miniProgressFill" style="width:0%"></div>
      </div>
      <span id="progressPct">0%</span>
    </div>

    <!-- TASK LIST -->
    <ul class="task-list" id="taskList">
      <!-- tasks rendered by JS -->
    </ul>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <p>No tasks yet. Add your first task above!</p>
    </div>
  </main>

  <footer class="footer">
    <p>KENTECH Study Hub &copy; 2026 · Built for KENTECH students</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
